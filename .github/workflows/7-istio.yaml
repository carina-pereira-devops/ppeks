# ─────────────────────────────────────────────────────────────────────────────
# Workflow 7 — Instalação do Istio + Gateway + VirtualService + Ingress
#
# ORDEM DE EXECUÇÃO OBRIGATÓRIA:
#   1-infra-eks.yaml → 4-infra-rds.yaml → 6-back-java.yaml
#   → 7-istio.yaml (ESTE) → 8-front-py.yaml
#
# CORREÇÕES APLICADAS:
#   1. URL do repositório Helm corrigida (estava com markdown link quebrado)
#   2. Step de limpeza de releases com falha ANTES de qualquer instalação
#      Evita: "UPGRADE FAILED: context deadline exceeded" em re-execuções
#   3. kubectl wait nos CRDs do istio-base ANTES de instalar o istiod
#      Evita: webhook não registrado → context deadline exceeded na instalação
#   4. sleep 30 entre istio-base e istiod para propagação dos CRDs
#   5. Verificação de saúde do istiod antes de instalar o ingressgateway
#
# PRÉ-REQUISITOS:
#   - Cluster EKS ppeks-cluster rodando
#   - SG rules para porta 15017 e 15012 aplicadas (sg-rule.tf atualizado)
#   - ALB Controller instalado (workflow 1)
#   - Backend Java rodando em appback (workflow 6)
#
# VERSÃO DO ISTIO: 1.23.5
# ─────────────────────────────────────────────────────────────────────────────
name: 7 - Instalação do Istio

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  istio:
    name: Install Istio
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:

      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Autenticação AWS via OIDC ────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::749000351410:role/github-carina-devops-pipe
          aws-region: us-east-1

      # ── 3. Atualizar kubeconfig ─────────────────────────────────────────────
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ppeks-cluster --region us-east-1

      # ── 4. Adicionar repositório Helm do Istio ──────────────────────────────
      # CORREÇÃO: URL estava com markdown link quebrado na versão anterior.
      # A URL correta é sem brackets: https://istio-release.storage.googleapis.com/charts
      - name: Add Istio Helm repository
        run: |
          helm repo add istio https://istio-release.storage.googleapis.com/charts
          helm repo update
          echo "Versões disponíveis do Istio:"
          helm search repo istio/base --versions | head -5

      # ── 5. Criar namespace istio-system ─────────────────────────────────────
      - name: Create istio-system namespace
        run: |
          kubectl create namespace istio-system --dry-run=client -o yaml | kubectl apply -f -

      # ── 6. Limpar releases Istio com falha anterior ─────────────────────────
      # CORREÇÃO: Se uma execução anterior falhou, o Helm guarda o release em
      # estado "failed" ou "pending-install". Um "upgrade --install" sobre um
      # release nesse estado também falha com "UPGRADE FAILED".
      # Este step detecta e limpa releases problemáticos ANTES de instalar.
      # Ordem reversa de remoção: ingressgateway → istiod → base (dependências)
      - name: Limpar releases Istio com falha anterior
        run: |
          for release in istio-ingressgateway istiod istio-base; do
            STATUS=$(helm status $release -n istio-system 2>/dev/null | grep "^STATUS:" | awk '{print $2}')
            echo ">> Release $release: status='$STATUS'"
            if [ "$STATUS" = "failed" ] || [ "$STATUS" = "pending-install" ] || [ "$STATUS" = "pending-upgrade" ]; then
              echo ">> Release $release em estado problemático — removendo..."
              helm uninstall $release -n istio-system 2>/dev/null || true
              sleep 5
            fi
          done
          echo ">> Verificação de limpeza concluída."

      # ── 7. Instalar istio-base (CRDs) ───────────────────────────────────────
      # O istio-base instala APENAS os CRDs:
      #   Gateway, VirtualService, DestinationRule, PeerAuthentication,
      #   AuthorizationPolicy — que o istiod precisa para funcionar.
      #
      # --wait garante que o Helm aguarda os CRDs serem registrados antes
      # de retornar. O kubectl wait logo abaixo é uma garantia adicional.
      - name: Install istio-base (CRDs)
        run: |
          helm upgrade --install istio-base istio/base             --namespace istio-system             --version 1.23.5             --set defaultRevision=default             --wait             --timeout 3m

          echo ">> CRDs do Istio registrados:"
          kubectl get crd | grep istio.io

      # ── 8. Aguardar CRDs propagarem no API server ───────────────────────────
      # CORREÇÃO: O --wait do Helm confirma que o Helm chart foi aplicado, mas
      # o API server pode levar alguns segundos a mais para registrar os CRDs
      # internamente. Se o istiod iniciar antes disso, o webhook falha.
      #
      # kubectl wait --for=condition=established garante que os CRDs estão
      # 100% prontos para uso antes de avançar.
      - name: Aguardar CRDs do Istio propagarem no API server
        run: |
          echo ">> Aguardando CRDs críticos do Istio..."
          kubectl wait --for=condition=established             crd/virtualservices.networking.istio.io             crd/gateways.networking.istio.io             crd/destinationrules.networking.istio.io             crd/peerauthentications.security.istio.io             --timeout=60s
          echo ">> CRDs prontos. Aguardando 30s adicionais para propagação completa..."
          sleep 30

      # ── 9. Instalar istiod (control plane) ──────────────────────────────────
      # O istiod é o cérebro do Istio com 3 funções:
      #   Pilot   → distribui configuração de roteamento para sidecars Envoy
      #   Citadel → emite certificados TLS para mTLS entre Pods
      #   Galley  → valida e processa Gateway, VirtualService, etc.
      #
      # PRÉ-REQUISITO DE REDE: A porta 15017 deve estar aberta no Security
      # Group dos nodes para o API server alcançar o webhook do istiod.
      # Isso é configurado no sg-rule.tf do módulo cluster.
      - name: Install istiod (control plane)
        run: |
          helm upgrade --install istiod istio/istiod             --namespace istio-system             --version 1.23.5             --set pilot.autoscaleEnabled=false             --set pilot.replicaCount=1             --set global.proxy.resources.requests.cpu=10m             --set global.proxy.resources.requests.memory=40Mi             --wait             --timeout 5m

          echo ">> Status do istiod:"
          kubectl get pods -n istio-system

      # ── 10. Verificar saúde do istiod antes de continuar ────────────────────
      # Garante que o istiod está READY antes de instalar o ingressgateway.
      # O ingressgateway precisa que o istiod esteja saudável para receber
      # o sidecar via webhook de injeção.
      - name: Verificar saúde do istiod
        run: |
          echo ">> Aguardando istiod ficar Ready..."
          kubectl rollout status deployment/istiod -n istio-system --timeout=3m
          echo ">> istiod Ready. Aguardando 15s para o webhook estabilizar..."
          sleep 15

      # ── 11. Instalar Istio Ingress Gateway ──────────────────────────────────
      # O Ingress Gateway é um Pod Envoy na borda da malha.
      # Fluxo: Internet → ALB → [Istio Ingress Gateway] → sidecar do front-py
      #
      # type: NodePort (NÃO LoadBalancer!)
      # O ALB é gerenciado pelo nosso Ingress com annotations do ALB Controller.
      # O Istio Gateway expõe via NodePort e o Ingress aponta para esse NodePort.
      # Resultado: 1 ALB controlado por nós, sem ALB extra criado pelo Istio.
      - name: Install Istio Ingress Gateway
        run: |
          helm upgrade --install istio-ingressgateway istio/gateway             --namespace istio-system             --version 1.23.5             --set service.type=NodePort             --set replicaCount=1             --wait             --timeout 5m

          echo ">> Status do Ingress Gateway:"
          kubectl get pods -n istio-system
          kubectl get svc -n istio-system

      # ── 12. Labela namespaces para injeção automática do sidecar ────────────
      # A label istio-injection=enabled instrui o istiod a injetar o container
      # istio-proxy (Envoy) em TODOS os Pods criados nesses namespaces.
      #
      # Fluxo de injeção:
      #   1. Pod criado no namespace labelado
      #   2. API server chama o MutatingWebhook do istiod (porta 15017)
      #   3. istiod modifica o Pod spec adicionando:
      #      - initContainer: configura iptables para interceptar tráfego
      #      - container istio-proxy: Envoy que gerencia o tráfego
      #   4. Pod sobe com 2 containers: app + istio-proxy (READY 2/2)
      #
      # IMPORTANTE: Pods existentes NÃO recebem sidecar — por isso o próximo
      # step faz rollout restart no backend.
      - name: Labela namespaces para injeção do sidecar Istio
        run: |
          kubectl create namespace appback  --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace appfront --dry-run=client -o yaml | kubectl apply -f -

          kubectl label namespace appback  istio-injection=enabled --overwrite
          kubectl label namespace appfront istio-injection=enabled --overwrite

          echo ">> Labels aplicadas:"
          kubectl get namespace appback appfront --show-labels

      # ── 13. Reiniciar backend para injetar o sidecar ────────────────────────
      # O java-back subiu ANTES do Istio (workflow 6) → sem sidecar Envoy.
      # Pods fora da malha: sem mTLS, sem Kiali, sem traces distribuídos.
      # rollout restart recria os Pods no namespace com istio-injection=enabled
      # → istiod injeta o sidecar automaticamente nos novos Pods.
      # Após restart: java-back aparece como READY 2/2 (app + istio-proxy).
      - name: Reiniciar backend para injetar sidecar Istio
        run: |
          echo ">> Reiniciando java-back para injetar sidecar..."
          kubectl rollout restart deployment/java-back -n appback

          echo
