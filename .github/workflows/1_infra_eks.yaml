# Infra IaC
name: "1 - Deploy/Destroy da Infra do Cluster EKS"

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: eks
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.3
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::749000351410:role/github-carina-devops-pipe"
          aws-region: "us-east-1"

      - name: Read destroy configuration
        id: read-destroy-config
        run: |
          DESTROY="$(jq -r '.boolean' ./iac_eks/destroy_config.json)"
          echo "destroy=$(echo $DESTROY)" >> $GITHUB_OUTPUT

      - name: Terraform Init
        run: cd iac_eks && terraform init

      - name: Terraform Validate
        run: cd iac_eks && terraform validate

      - name: Limpar recursos Kubernetes antes do destroy
        if: steps.read-destroy-config.outputs.destroy == 'true'
        run: |
          aws eks update-kubeconfig \
            --name ppeks-cluster \
            --region us-east-1

          echo ">> Deletando Ingress (força remoção dos ALBs pela AWS)..."
          kubectl delete ingress --all --all-namespaces --ignore-not-found=true || true

          echo ">> Deletando Services do tipo LoadBalancer..."
          kubectl delete svc --all --all-namespaces \
            --field-selector spec.type=LoadBalancer \
            --ignore-not-found=true || true

          echo ">> Aguardando 60s para AWS remover os ALBs e ENIs..."
          sleep 60

          echo ">> Deletando todos os namespaces do projeto..."
          kubectl delete namespace appback appfront --ignore-not-found=true || true

          echo ">> Aguardando 30s para finalizar limpeza..."
          sleep 30

      - name: Terraform Destroy
        if: steps.read-destroy-config.outputs.destroy == 'true'
        id: terraform-destroy
        run: cd iac_eks && terraform destroy -auto-approve

      - name: "Terraform Apply — 1/3 Rede + Cluster + MGN"
        if: steps.read-destroy-config.outputs.destroy != 'true'
        run: |
          cd iac_eks
          terraform apply -auto-approve \
            -target=module.eks_network \
            -target=module.eks_cluster \
            -target=module.eks_managed_node_group

      - name: "Terraform Apply — 2/3 ALB Controller + Karpenter IAM + Helm"
        if: steps.read-destroy-config.outputs.destroy != 'true'
        run: |
          cd iac_eks
          terraform apply -auto-approve \
            -target=module.eks_aws_load_balancer_controller \
            -target=module.eks_karpenter.aws_iam_role.karpenter_controller \
            -target=module.eks_karpenter.aws_iam_role.karpenter_node \
            -target=module.eks_karpenter.aws_iam_instance_profile.karpenter_node \
            -target=module.eks_karpenter.aws_iam_policy.karpenter_controller \
            -target=module.eks_karpenter.aws_iam_role_policy_attachment.karpenter_controller \
            -target=module.eks_karpenter.aws_iam_role_policy_attachment.karpenter_node_worker \
            -target=module.eks_karpenter.aws_iam_role_policy_attachment.karpenter_node_ecr \
            -target=module.eks_karpenter.aws_iam_role_policy_attachment.karpenter_node_cni \
            -target=module.eks_karpenter.aws_iam_role_policy_attachment.karpenter_node_ssm \
            -target=module.eks_karpenter.aws_eks_access_entry.karpenter_node \
            -target=module.eks_karpenter.aws_sqs_queue.karpenter_interruption \
            -target=module.eks_karpenter.aws_sqs_queue_policy.karpenter_interruption \
            -target=module.eks_karpenter.aws_cloudwatch_event_rule.spot_interruption \
            -target=module.eks_karpenter.aws_cloudwatch_event_target.spot_interruption \
            -target=module.eks_karpenter.aws_cloudwatch_event_rule.instance_rebalance \
            -target=module.eks_karpenter.aws_cloudwatch_event_target.instance_rebalance \
            -target=module.eks_karpenter.aws_cloudwatch_event_rule.instance_state_change \
            -target=module.eks_karpenter.aws_cloudwatch_event_target.instance_state_change \
            -target=module.eks_karpenter.helm_release.karpenter

      - name: "Terraform Apply — 3/3 Karpenter NodePool + EC2NodeClass"
        if: steps.read-destroy-config.outputs.destroy != 'true'
        run: |
          cd iac_eks
          echo ">> Aguardando CRDs do Karpenter propagarem..."
          sleep 30
          terraform apply -auto-approve